<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehl Hours</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app-wrap{max-width:740px;margin:0 auto;padding:16px}
input,select,button{font-family:inherit;font-size:13px}
input[type=text],input[type=number],input[type=time],input[type=email]{border:1px solid #d0d0cc;border-radius:8px;padding:6px 9px;background:#fff;color:#1a1a1a;width:100%}
input:focus{outline:none;box-shadow:0 0 0 2px #9FE1CB;border-color:#1D9E75}
input[type=checkbox]{width:15px;height:15px;accent-color:#1D9E75;cursor:pointer;flex-shrink:0}
button{cursor:pointer;border-radius:8px;padding:6px 12px;border:1px solid #d0d0cc;background:#fff;color:#1a1a1a;transition:background 0.15s}
button:hover{background:#f0f0ec}
button.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
button.primary:hover{background:#0F6E56}
button.save-btn{background:#185FA5;color:#fff;border-color:#185FA5}
button.save-btn:hover{background:#0C447C}
button.danger{color:#E24B4A;border-color:transparent;background:transparent}
button.danger:hover{background:#FCEBEB;border-color:#E24B4A}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:16px 20px;margin-bottom:12px}
.metric{background:#f5f5f3;border-radius:8px;padding:10px;text-align:center}
.metric-label{font-size:11px;color:#888;margin-bottom:3px}
.metric-val{font-size:18px;font-weight:500}
.slabel{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px}
.over{background:#FCEBEB;color:#A32D2D}
.ok{background:#EAF3DE;color:#3B6D11}
.warn{background:#FAEEDA;color:#854F0B}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.emp-header{display:grid;grid-template-columns:1fr 100px 100px 74px 30px;gap:6px;margin-bottom:4px}
.emp-header span{font-size:11px;color:#888;text-align:center}
.emp-header span:first-child{text-align:left}
.emp-row{display:grid;grid-template-columns:1fr 100px 100px 74px 30px;gap:6px;align-items:center;margin-bottom:5px}
.divider{border:none;border-top:1px solid #ebebea;margin:12px 0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bag-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.spray-row{display:grid;grid-template-columns:1fr 76px 110px 30px;gap:6px;align-items:center;margin-bottom:5px}
.spray-hdr{display:grid;grid-template-columns:1fr 76px 110px 30px;gap:6px;margin-bottom:4px}
.spray-hdr span{font-size:11px;color:#888}
.inline-check{display:flex;align-items:center;gap:6px;font-size:13px}
.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.nav-btn{font-size:13px;padding:5px 16px;border-radius:20px}
.nav-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.step{display:none}.step.active{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:9px 22px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#E6F1FB;color:#185FA5;font-size:11px;cursor:pointer;position:relative;font-style:normal;line-height:1;vertical-align:middle;margin-left:3px}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:12px;padding:7px 10px;border-radius:8px;white-space:normal;width:230px;line-height:1.5;pointer-events:none;opacity:0;transition:opacity .2s;z-index:100;font-weight:400}
.tip:hover::after{opacity:1}
@media(max-width:520px){
  .emp-header,.emp-row{grid-template-columns:1fr 80px 80px 60px 26px}
  .bag-grid{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}
  .spray-row,.spray-hdr{grid-template-columns:1fr 60px 90px 26px}
}
</style>
</head>
<body>
<div class="app-wrap">
  <div id="toast" class="toast"></div>

  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:8px">
      <i class="ti ti-plant" style="font-size:22px;color:#1D9E75"></i>
      <span style="font-size:19px;font-weight:600">Rehl Hours</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="save-indicator" style="font-size:11px;color:#888"></span>
      <button class="save-btn" onclick="saveDay()"><i class="ti ti-device-floppy"></i> Save</button>
      <span id="day-badge" style="font-size:12px;color:#888"></span>
    </div>
  </div>

  <div id="nav" class="nav"></div>

  <!-- SETUP -->
  <div id="step-setup" class="step active card">
    <div class="slabel">Day setup</div>
    <div class="g2" style="margin-bottom:14px">
      <div>
        <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Supervisor</label>
        <input type="text" id="sup-name" placeholder="Your name">
      </div>
      <div>
        <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Email</label>
        <input type="email" id="sup-email" placeholder="your@email.com">
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="slabel" style="margin:0">Crew</div>
      <button onclick="addCrewInput()"><i class="ti ti-plus"></i> Add</button>
    </div>
    <div id="crew-inputs"></div>
    <hr class="divider">
    <div class="g2">
      <div>
        <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">
          Total lunch estimated (min)
          <span class="tip" data-tip="Add up each employee's lunch. Example: 3 employees x 30 min = 90 minutes.">i</span>
        </label>
        <input type="number" id="lunch-total" value="0" min="0" onchange="recalcAll()">
      </div>
      <div>
        <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">
          Total travel time estimated (min)
          <span class="tip" data-tip="Add up each employee's travel time. Include door-to-door time or the number of minutes from your client spreadsheet.">i</span>
        </label>
        <input type="number" id="travel-total" value="0" min="0" onchange="recalcAll()">
      </div>
    </div>
    <div style="text-align:right;margin-top:14px">
      <button class="primary" onclick="goToClients()">Clients <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <!-- CLIENTS -->
  <div id="step-clients" class="step">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:16px;font-weight:600">Clients</span>
      <button class="primary" onclick="addClient()"><i class="ti ti-plus"></i> Add client</button>
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="g3">
        <div class="metric"><div class="metric-label">Lunch</div><div class="metric-val" id="lunch-disp">0 min</div></div>
        <div class="metric"><div class="metric-label">Travel</div><div class="metric-val" id="travel-disp">0 min</div></div>
        <div class="metric"><div class="metric-label">Per-client deduct</div><div class="metric-val" id="per-client-disp">—</div></div>
      </div>
    </div>
    <div id="clients-list"></div>
    <div style="text-align:right;margin-top:6px">
      <button class="primary" onclick="showStep('step-summary')">Day summary <i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="step-summary" class="step">
    <div style="font-size:16px;font-weight:600;margin-bottom:12px">Day summary</div>
    <div id="summary-content"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button onclick="showStep('step-clients')"><i class="ti ti-arrow-left"></i> Back</button>
      <button class="save-btn" onclick="saveDay()"><i class="ti ti-device-floppy"></i> Save</button>
      <button class="primary" onclick="submitReport()"><i class="ti ti-send"></i> Submit report</button>
    </div>
  </div>
</div>

<script>
let clientCount = 0;
const SAVE_KEY = 'rehlhours_v2';

function init() {
  localStorage.removeItem('rehlhours_day');
  document.getElementById('day-badge').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) {
    try { restoreDay(JSON.parse(saved)); showToast('Restored saved data'); }
    catch(e) { /* start fresh */ }
  }
  buildNav();
}

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  [['step-setup','Setup'],['step-clients','Clients'],['step-summary','Summary']].forEach(([id, label]) => {
    const b = document.createElement('button');
    b.className = 'nav-btn' + (document.getElementById(id).classList.contains('active') ? ' active' : '');
    b.textContent = label;
    b.onclick = () => showStep(id);
    nav.appendChild(b);
  });
}

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  buildNav();
  if (id === 'step-summary') renderSummary();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function addCrewInput(name) {
  name = name || '';
  const d = document.getElementById('crew-inputs');
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = '<input type="text" placeholder="Name" value="' + name + '" style="max-width:200px">' +
    '<button class="danger" onclick="this.parentElement.remove()"><i class="ti ti-trash"></i></button>';
  d.appendChild(row);
}

function getCrew() {
  return [...document.querySelectorAll('#crew-inputs input')].map(i => i.value.trim()).filter(Boolean);
}

function goToClients() {
  loadSharedDeduct();
  showStep('step-clients');
  if (!document.querySelector('.client-card')) addClient();
}

function loadSharedDeduct() {
  const l = parseFloat(document.getElementById('lunch-total').value) || 0;
  const t = parseFloat(document.getElementById('travel-total').value) || 0;
  const n = document.querySelectorAll('.client-card').length || 1;
  const per = (l + t) / 60 / n;
  document.getElementById('lunch-disp').textContent = l + ' min';
  document.getElementById('travel-disp').textContent = t + ' min';
  document.getElementById('per-client-disp').textContent = per.toFixed(2) + ' hr';
}

function addClient(data) {
  const id = 'c' + clientCount++;
  const crew = getCrew();
  const list = document.getElementById('clients-list');
  const card = document.createElement('div');
  card.className = 'card client-card';
  card.id = id;
  card.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">' +
      '<input type="text" placeholder="Client name" style="font-size:14px;font-weight:600;max-width:200px" oninput="recalcAll()">' +
      '<div style="display:flex;align-items:center;gap:6px">' +
        '<label style="font-size:12px;color:#888">Budget hrs</label>' +
        '<input type="number" placeholder="0" min="0" step="0.5" style="width:68px" oninput="recalcClient(\'' + id + '\')">' +
      '</div>' +
      '<div style="margin-left:auto"><button class="danger" onclick="removeClient(\'' + id + '\')"><i class="ti ti-trash"></i></button></div>' +
    '</div>' +
    '<div class="emp-header"><span>Employee</span><span>Start</span><span>End</span><span>Hours</span><span></span></div>' +
    '<div class="emp-rows" id="' + id + '-emps">' + crew.map(function(n){return empRow(n);}).join('') + '</div>' +
    '<button onclick="addEmpRow(\'' + id + '\')" style="font-size:12px;margin-top:4px"><i class="ti ti-plus"></i> Employee</button>' +
    '<hr class="divider">' +
    '<div class="slabel"><i class="ti ti-leaf" style="font-size:12px"></i> Products</div>' +
    '<div class="g2" style="margin-bottom:10px">' +
      '<div><label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Scram cups used</label>' +
        '<input type="number" min="0" placeholder="0" id="' + id + '-scram" style="width:90px"></div>' +
      '<div style="display:flex;flex-direction:column;gap:8px;justify-content:center">' +
        '<label class="inline-check"><input type="checkbox" id="' + id + '-rose-cb" onchange="toggleRoses(\'' + id + '\')"> Rosetone applied</label>' +
        '<div id="' + id + '-rose-row" style="display:none" class="inline-check">' +
          '<label style="font-size:12px;color:#888;margin-right:4px">Roses</label>' +
          '<input type="number" min="0" placeholder="0" id="' + id + '-rose-n" style="width:70px">' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="slabel">Sprays</div>' +
    '<div class="spray-hdr"><span>Product</span><span>Gallons</span><span>Rate (e.g. 1tsp/gal)</span><span></span></div>' +
    '<div id="' + id + '-sprays"></div>' +
    '<button onclick="addSpray(\'' + id + '\')" style="font-size:12px;margin-bottom:12px"><i class="ti ti-plus"></i> Add spray</button>' +
    '<hr class="divider">' +
    '<div class="slabel"><i class="ti ti-archive" style="font-size:12px"></i> Bags</div>' +
    '<div class="bag-grid" style="margin-bottom:6px">' +
      '<div><label style="font-size:12px;color:#185FA5;display:block;margin-bottom:3px">Paper left</label><input type="number" min="0" placeholder="0" id="' + id + '-paper-left"></div>' +
      '<div><label style="font-size:12px;color:#185FA5;display:block;margin-bottom:3px">Paper hauled</label><input type="number" min="0" placeholder="0" id="' + id + '-paper-hauled"></div>' +
      '<div><label style="font-size:12px;color:#BA7517;display:block;margin-bottom:3px">Plastic left</label><input type="number" min="0" placeholder="0" id="' + id + '-plastic-left"></div>' +
      '<div><label style="font-size:12px;color:#BA7517;display:block;margin-bottom:3px">Plastic hauled</label><input type="number" min="0" placeholder="0" id="' + id + '-plastic-hauled"></div>' +
    '</div>' +
    '<hr class="divider">' +
    '<div class="g4" id="' + id + '-metrics">' +
      '<div class="metric"><div class="metric-label">Budget</div><div class="metric-val" id="' + id + '-budget">—</div></div>' +
      '<div class="metric"><div class="metric-label">Worked</div><div class="metric-val" id="' + id + '-worked">0.00</div></div>' +
      '<div class="metric"><div class="metric-label">Deduct</div><div class="metric-val" id="' + id + '-deduct">—</div></div>' +
      '<div class="metric"><div class="metric-label">Remaining</div><div class="metric-val" id="' + id + '-remaining">—</div></div>' +
    '</div>';
  list.appendChild(card);
  if (data) restoreClientData(id, data);
  recalcAll();
}

function empRow(name, start, end) {
  name = name || ''; start = start || ''; end = end || '';
  return '<div class="emp-row">' +
    '<input type="text" placeholder="Name" value="' + name + '" oninput="recalcAll()">' +
    '<input type="time" value="' + start + '" oninput="recalcAll()">' +
    '<input type="time" value="' + end + '" oninput="recalcAll()">' +
    '<input type="text" readonly placeholder="0.00" style="background:#f5f5f3;text-align:center;font-size:12px">' +
    '<button class="danger" onclick="this.parentElement.remove();recalcAll()" style="padding:3px 6px"><i class="ti ti-x"></i></button>' +
    '</div>';
}

function addEmpRow(cid) {
  document.getElementById(cid + '-emps').insertAdjacentHTML('beforeend', empRow());
}

function addSpray(cid, name, gal, rate) {
  name = name || ''; gal = gal || ''; rate = rate || '';
  document.getElementById(cid + '-sprays').insertAdjacentHTML('beforeend',
    '<div class="spray-row">' +
      '<input type="text" placeholder="e.g. Neem oil" value="' + name + '">' +
      '<input type="number" min="0" step="0.5" placeholder="0" value="' + gal + '" style="width:100%">' +
      '<input type="text" placeholder="e.g. 1tsp/gal" value="' + rate + '">' +
      '<button class="danger" onclick="this.parentElement.remove()" style="padding:3px 6px"><i class="ti ti-x"></i></button>' +
    '</div>');
}

function toggleRoses(cid) {
  const cb = document.getElementById(cid + '-rose-cb');
  document.getElementById(cid + '-rose-row').style.display = cb.checked ? 'flex' : 'none';
}

function removeClient(id) { document.getElementById(id).remove(); recalcAll(); }

function parseTime(v) {
  if (!v) return null;
  const parts = v.split(':');
  return parseInt(parts[0]) + parseInt(parts[1]) / 60;
}

function recalcAll() {
  loadSharedDeduct();
  document.querySelectorAll('.client-card').forEach(function(c){ recalcClient(c.id); });
}

function recalcClient(id) {
  const card = document.getElementById(id); if (!card) return;
  const l = parseFloat(document.getElementById('lunch-total').value) || 0;
  const t = parseFloat(document.getElementById('travel-total').value) || 0;
  const n = document.querySelectorAll('.client-card').length || 1;
  const deductHr = (l + t) / 60 / n;
  const budget = parseFloat(card.querySelectorAll('input[type=number]')[0].value) || null;
  let totalWorked = 0;
  card.querySelectorAll('.emp-row').forEach(function(row) {
    const ins = row.querySelectorAll('input');
    const s = parseTime(ins[1].value), e = parseTime(ins[2].value);
    const hrs = (s !== null && e !== null && e > s) ? e - s : 0;
    ins[3].value = hrs > 0 ? hrs.toFixed(2) + ' hr' : '';
    totalWorked += hrs;
  });
  document.getElementById(id + '-worked').textContent = totalWorked.toFixed(2);
  document.getElementById(id + '-deduct').textContent = deductHr.toFixed(2);
  if (budget !== null) {
    document.getElementById(id + '-budget').textContent = budget.toFixed(2);
    const rem = budget - totalWorked - deductHr;
    const el = document.getElementById(id + '-remaining');
    el.textContent = rem.toFixed(2);
    el.style.color = rem < 0 ? '#E24B4A' : rem < 0.5 ? '#BA7517' : '#3B6D11';
  } else {
    document.getElementById(id + '-budget').textContent = '—';
    document.getElementById(id + '-remaining').textContent = '—';
  }
}

function getClientData(card) {
  const id = card.id;
  const name = card.querySelector('input[type=text]').value || 'Unnamed';
  const budget = parseFloat(card.querySelectorAll('input[type=number]')[0].value) || null;
  const worked = parseFloat(document.getElementById(id + '-worked').textContent) || 0;
  const deduct = parseFloat(document.getElementById(id + '-deduct').textContent) || 0;
  const remaining = budget !== null ? budget - worked - deduct : null;
  const scram = parseInt(document.getElementById(id + '-scram').value) || 0;
  const roseOn = document.getElementById(id + '-rose-cb').checked || false;
  const roseN = parseInt(document.getElementById(id + '-rose-n').value) || 0;
  const paperLeft = parseInt(document.getElementById(id + '-paper-left').value) || 0;
  const paperHauled = parseInt(document.getElementById(id + '-paper-hauled').value) || 0;
  const plasticLeft = parseInt(document.getElementById(id + '-plastic-left').value) || 0;
  const plasticHauled = parseInt(document.getElementById(id + '-plastic-hauled').value) || 0;
  const sprays = [];
  card.querySelectorAll('.spray-row').forEach(function(row) {
    const ins = row.querySelectorAll('input');
    if (ins[0].value) sprays.push({name: ins[0].value, gallons: ins[1].value || '0', rate: ins[2].value});
  });
  const employees = [];
  card.querySelectorAll('.emp-row').forEach(function(row) {
    const ins = row.querySelectorAll('input');
    if (ins[0].value) employees.push({name: ins[0].value, start: ins[1].value, end: ins[2].value, hrs: ins[3].value});
  });
  return {id:id, name:name, budget:budget, worked:worked, deduct:deduct, remaining:remaining,
    scram:scram, roseOn:roseOn, roseN:roseN,
    paperLeft:paperLeft, paperHauled:paperHauled, plasticLeft:plasticLeft, plasticHauled:plasticHauled,
    sprays:sprays, employees:employees};
}

function saveDay() {
  const data = {
    savedAt: new Date().toISOString(),
    supervisor: document.getElementById('sup-name').value,
    email: document.getElementById('sup-email').value,
    crew: getCrew(),
    lunch: document.getElementById('lunch-total').value,
    travel: document.getElementById('travel-total').value,
    clients: [...document.querySelectorAll('.client-card')].map(function(c){ return getClientData(c); })
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  const t = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  document.getElementById('save-indicator').textContent = 'Saved ' + t;
  showToast('Saved at ' + t);
}

function restoreDay(data) {
  if (data.supervisor) document.getElementById('sup-name').value = data.supervisor;
  if (data.email) document.getElementById('sup-email').value = data.email;
  if (data.lunch) document.getElementById('lunch-total').value = data.lunch;
  if (data.travel) document.getElementById('travel-total').value = data.travel;
  document.getElementById('crew-inputs').innerHTML = '';
  (data.crew || []).forEach(function(n){ addCrewInput(n); });
  (data.clients || []).forEach(function(c){ addClient(c); });
  recalcAll();
}

function restoreClientData(id, d) {
  const card = document.getElementById(id); if (!card) return;
  const nameIn = card.querySelector('input[type=text]'); if (nameIn) nameIn.value = d.name || '';
  const budgetIn = card.querySelectorAll('input[type=number]')[0]; if (budgetIn && d.budget) budgetIn.value = d.budget;
  const scramIn = document.getElementById(id + '-scram'); if (scramIn) scramIn.value = d.scram || 0;
  const roseCb = document.getElementById(id + '-rose-cb');
  if (roseCb && d.roseOn) { roseCb.checked = true; toggleRoses(id); }
  const roseN = document.getElementById(id + '-rose-n'); if (roseN) roseN.value = d.roseN || 0;
  const pl = document.getElementById(id + '-paper-left'); if (pl) pl.value = d.paperLeft || 0;
  const ph = document.getElementById(id + '-paper-hauled'); if (ph) ph.value = d.paperHauled || 0;
  const pll = document.getElementById(id + '-plastic-left'); if (pll) pll.value = d.plasticLeft || 0;
  const plh = document.getElementById(id + '-plastic-hauled'); if (plh) plh.value = d.plasticHauled || 0;
  const empContainer = document.getElementById(id + '-emps');
  if (empContainer && d.employees && d.employees.length) {
    empContainer.innerHTML = '';
    d.employees.forEach(function(e){ empContainer.insertAdjacentHTML('beforeend', empRow(e.name, e.start, e.end)); });
  }
  (d.sprays || []).forEach(function(s){ addSpray(id, s.name, s.gallons, s.rate); });
}

function renderSummary() {
  const crew = getCrew();
  const l = parseFloat(document.getElementById('lunch-total').value) || 0;
  const t = parseFloat(document.getElementById('travel-total').value) || 0;
  const sup = document.getElementById('sup-name').value || '—';
  const cards = [...document.querySelectorAll('.client-card')];
  let grandWorked = 0, grandBudget = 0;
  let totPaperLeft = 0, totPaperHauled = 0, totPlasticLeft = 0, totPlasticHauled = 0;

  let html = '<div class="card" style="margin-bottom:10px">' +
    '<div class="g2" style="margin-bottom:8px">' +
      '<div class="metric"><div class="metric-label">Supervisor</div><div class="metric-val" style="font-size:15px">' + sup + '</div></div>' +
      '<div class="metric"><div class="metric-label">Crew</div><div class="metric-val" style="font-size:13px;line-height:1.5">' + (crew.join(', ') || '—') + '</div></div>' +
    '</div>' +
    '<div style="font-size:12px;color:#888;text-align:center">Lunch ' + l + 'min + Travel ' + t + 'min &divide; ' + cards.length + ' client(s) = ' + ((l+t)/60/Math.max(cards.length,1)).toFixed(2) + ' hr deducted per client</div>' +
  '</div>';

  cards.forEach(function(card) {
    const d = getClientData(card);
    grandWorked += d.worked; if (d.budget) grandBudget += d.budget;
    totPaperLeft += d.paperLeft; totPaperHauled += d.paperHauled;
    totPlasticLeft += d.plasticLeft; totPlasticHauled += d.plasticHauled;
    const tag = d.remaining === null ? '' :
      '<span class="tag ' + (d.remaining < 0 ? 'over' : d.remaining < 0.5 ? 'warn' : 'ok') + '">' + (d.remaining < 0 ? 'Over budget' : d.remaining < 0.5 ? 'Near limit' : 'On track') + '</span>';
    html += '<div class="card" style="margin-bottom:8px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600">' + d.name + '</span>' + tag + '</div>' +
      '<div class="g4" style="margin-bottom:8px">' +
        '<div class="metric"><div class="metric-label">Budget</div><div class="metric-val">' + (d.budget !== null ? d.budget.toFixed(2) : '—') + '</div></div>' +
        '<div class="metric"><div class="metric-label">Worked</div><div class="metric-val">' + d.worked.toFixed(2) + '</div></div>' +
        '<div class="metric"><div class="metric-label">Deduct</div><div class="metric-val">' + d.deduct.toFixed(2) + '</div></div>' +
        '<div class="metric"><div class="metric-label">Remaining</div><div class="metric-val" style="color:' + (d.remaining === null ? 'inherit' : d.remaining < 0 ? '#E24B4A' : d.remaining < 0.5 ? '#BA7517' : '#3B6D11') + '">' + (d.remaining !== null ? d.remaining.toFixed(2) : '—') + '</div></div>' +
      '</div>' +
      '<div style="font-size:12px;color:#888;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">' +
        d.employees.map(function(e){ return '<span>' + e.name + ': ' + (e.start||'—') + '&rarr;' + (e.end||'—') + ' (' + (e.hrs||'0 hr') + ')</span>'; }).join('') +
      '</div>' +
      '<hr class="divider" style="margin:7px 0">' +
      '<div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px;margin-bottom:8px">' +
        '<span><i class="ti ti-package" style="font-size:12px"></i> Scram: <strong>' + d.scram + ' cups</strong></span>' +
        (d.roseOn ? '<span><i class="ti ti-flower" style="font-size:12px"></i> Rosetone: <strong>' + d.roseN + ' roses</strong></span>' : '') +
        d.sprays.map(function(s){ return '<span><i class="ti ti-droplet" style="font-size:12px"></i> ' + s.name + ': <strong>' + s.gallons + 'gal @ ' + s.rate + '</strong></span>'; }).join('') +
      '</div>' +
      '<div class="bag-grid">' +
        '<div style="background:#E6F1FB;border-radius:8px;padding:7px 8px"><div style="font-size:10px;color:#185FA5;margin-bottom:2px">Paper left</div><strong style="color:#0C447C">' + d.paperLeft + '</strong></div>' +
        '<div style="background:#E6F1FB;border-radius:8px;padding:7px 8px"><div style="font-size:10px;color:#185FA5;margin-bottom:2px">Paper hauled</div><strong style="color:#0C447C">' + d.paperHauled + '</strong></div>' +
        '<div style="background:#FAEEDA;border-radius:8px;padding:7px 8px"><div style="font-size:10px;color:#854F0B;margin-bottom:2px">Plastic left</div><strong style="color:#633806">' + d.plasticLeft + '</strong></div>' +
        '<div style="background:#FAEEDA;border-radius:8px;padding:7px 8px"><div style="font-size:10px;color:#854F0B;margin-bottom:2px">Plastic hauled</div><strong style="color:#633806">' + d.plasticHauled + '</strong></div>' +
      '</div>' +
    '</div>';
  });

  const totalHauled = totPaperHauled + totPlasticHauled;
  const paperPct = totalHauled > 0 ? Math.round(totPaperHauled / totalHauled * 100) : 0;
  const plasticPct = totalHauled > 0 ? Math.round(totPlasticHauled / totalHauled * 100) : 0;

  html += '<div class="card">' +
    '<div class="slabel">Day totals — hours</div>' +
    '<div class="g3" style="margin-bottom:14px">' +
      '<div class="metric"><div class="metric-label">Hours worked</div><div class="metric-val">' + grandWorked.toFixed(2) + '</div></div>' +
      '<div class="metric"><div class="metric-label">Total budget</div><div class="metric-val">' + (grandBudget > 0 ? grandBudget.toFixed(2) : '—') + '</div></div>' +
      '<div class="metric"><div class="metric-label">Clients visited</div><div class="metric-val">' + cards.length + '</div></div>' +
    '</div>' +
    '<div class="slabel">Day totals — bags</div>' +
    '<div class="bag-grid" style="margin-bottom:14px">' +
      '<div class="metric" style="background:#E6F1FB"><div class="metric-label" style="color:#185FA5">Paper left</div><div class="metric-val" style="color:#0C447C">' + totPaperLeft + '</div></div>' +
      '<div class="metric" style="background:#E6F1FB"><div class="metric-label" style="color:#185FA5">Paper hauled</div><div class="metric-val" style="color:#0C447C">' + totPaperHauled + '</div></div>' +
      '<div class="metric" style="background:#FAEEDA"><div class="metric-label" style="color:#854F0B">Plastic left</div><div class="metric-val" style="color:#633806">' + totPlasticLeft + '</div></div>' +
      '<div class="metric" style="background:#FAEEDA"><div class="metric-label" style="color:#854F0B">Plastic hauled</div><div class="metric-val" style="color:#633806">' + totPlasticHauled + '</div></div>' +
    '</div>' +
    '<div class="slabel">Bag mix — today</div>' +
    '<div style="background:#f5f5f3;border-radius:8px;overflow:hidden;height:30px;display:flex;margin-bottom:8px">' +
      (totalHauled === 0
        ? '<div style="width:100%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888">No bags hauled today</div>'
        : '<div style="width:' + paperPct + '%;background:#378ADD;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:500">' + (paperPct > 8 ? paperPct + '%' : '') + '</div>' +
          '<div style="width:' + plasticPct + '%;background:#EF9F27;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:500">' + (plasticPct > 8 ? plasticPct + '%' : '') + '</div>'
      ) +
    '</div>' +
    '<div style="display:flex;gap:14px;font-size:12px;color:#888;flex-wrap:wrap">' +
      '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;display:inline-block"></span>Paper — ' + totPaperHauled + ' bags hauled</span>' +
      '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#EF9F27;display:inline-block"></span>Plastic — ' + totPlasticHauled + ' bags hauled</span>' +
    '</div>' +
  '</div>';

  document.getElementById('summary-content').innerHTML = html;
}

function submitReport() {
  const sup = document.getElementById('sup-name').value || 'Supervisor';
  const email = document.getElementById('sup-email').value;
  const date = new Date().toLocaleDateString();
  const l = parseFloat(document.getElementById('lunch-total').value) || 0;
  const t = parseFloat(document.getElementById('travel-total').value) || 0;
  const cards = [...document.querySelectorAll('.client-card')];
  let body = 'REHL HOURS REPORT — ' + date + '\nSupervisor: ' + sup + '\nCrew: ' + getCrew().join(', ') + '\nLunch: ' + l + 'min | Travel: ' + t + 'min\n' + '='.repeat(42) + '\n\n';
  cards.forEach(function(card) {
    const d = getClientData(card);
    body += 'CLIENT: ' + d.name + '\n';
    body += '  Budget: ' + (d.budget || '—') + ' | Worked: ' + d.worked.toFixed(2) + ' | Deduct: ' + d.deduct.toFixed(2) + ' | Remaining: ' + (d.remaining !== null ? d.remaining.toFixed(2) : '—') + '\n';
    d.employees.forEach(function(e){ body += '  ' + e.name + ': ' + (e.start||'—') + ' to ' + (e.end||'—') + ' (' + (e.hrs||'0 hr') + ')\n'; });
    body += '  Scram: ' + d.scram + ' cups\n';
    if (d.roseOn) body += '  Rosetone: yes — ' + d.roseN + ' roses\n';
    d.sprays.forEach(function(s){ body += '  Spray: ' + s.name + ' — ' + s.gallons + ' gal @ ' + s.rate + '\n'; });
    body += '  Paper: ' + d.paperLeft + ' left, ' + d.paperHauled + ' hauled\n';
    body += '  Plastic: ' + d.plasticLeft + ' left, ' + d.plasticHauled + ' hauled\n\n';
  });
  saveDay();
  window.open('mailto:' + email + '?subject=Rehl Hours — ' + encodeURIComponent(date) + '&body=' + encodeURIComponent(body));
}

init();
</script>
</body>
</html>
